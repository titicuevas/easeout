[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000

pm = static
pm.max_children = 5
pm.max_requests = 0

php_admin_flag[log_errors] = on
php_admin_value[error_log] = /proc/self/fd/2
catch_workers_output = yes

php_admin_value[memory_limit] = 128M
php_admin_value[max_execution_time] = 30 